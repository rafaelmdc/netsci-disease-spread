# ===========================================================================
# experiment.yaml — MASTER CONFIG. The single place to tune everything.
#
# This drives both network generation and the full evaluation sweep:
#   netsci netgen build-all --config experiment.yaml   # build every network
#   netsci evaluate sweep    --config experiment.yaml   # run the whole grid
#   netsci evaluate collect                             # aggregate to a table
#
# Every list below is a sweep axis: the experiment is the Cartesian product of
# regions x layer_sets x models x strategies x (budgets x coverages x
# efficacies) x beta_scales x taus x horizons x seeds.
# ===========================================================================

# --- Geography & substrate: the 8 networks we build & study ------------------
# Explicit `networks` list (overrides regions x layer_sets). The substrate is
# deliberately ASYMMETRIC, see docs/EXPERIMENTS.md:
#   * air-only across every region  -> fair cross-region comparison (uniform
#     OpenFlights data everywhere => differences reflect topology, not data);
#   * air+land+water for EUROPE only -> the multilayer flagship, where ground
#     and ferry flow data is dense enough to be defensible (validated vs
#     Eurostat). Europe also gets the air and air+land rungs so the ladder
#     (air -> +land -> +water) is an apples-to-apples comparison.
networks:
  # -- Europe ladder (same region, more realism each step) --
  - {region: europe,   layers: [air, land, water]}   # 1 (flagship)
  - {region: europe,   layers: [air, land]}          # 2
  - {region: europe,   layers: [air]}                # 3  (shared pivot)
  # -- Cross-region spectrum (same layer everywhere, fair comparison) --
  - {region: americas, layers: [air]}                # 4
  - {region: asia,     layers: [air]}                # 5
  - {region: africa,   layers: [air]}                # 6
  - {region: oceania,  layers: [air]}                # 7
  - {region: world,    layers: [air]}                # 8

# Legacy cartesian axes (ignored while `networks` above is set; kept as docs).
regions:    [europe]
layer_sets: [[air]]

# --- Population proxy (fallback only) -----------------------------------------
# Real GeoNames city populations are used for nodes; this proxy
# pop(v)=p0+degree(v)*p_route only fills any node lacking a real population.
population:
  p0: 150000
  p_route: 45000

# --- Models: which to run and their parameters -------------------------------
# Remove a model to skip it. SEIR needs `sigma`; SQIR needs `kappa` + `gamma_q`.
models:
  sir:  {beta: 0.32, gamma: 0.12}
  sis:  {beta: 0.32, gamma: 0.12}
  seir: {beta: 0.32, gamma: 0.12, sigma: 0.2}
  sqir: {beta: 0.32, gamma: 0.12, kappa: 0.15, gamma_q: 0.1}

# --- Vaccination strategies --------------------------------------------------
# Blueprint set (control, random, degree, betweenness) + subgraph (novelty).
# kcore available in the registry but excluded to keep the grid focused.
strategies: [control, random, degree, betweenness, subgraph]
budgets:    [15]            # number of cities immunised
coverages:  [0.01, 0.75]    # low vs high adherence (blueprint comparison)
efficacies: [0.85]

# --- Sensitivity axes (for ranking-stability / operating-point analysis) -----
beta_scales: [1.0]          # multiplies every model's beta (R0 sensitivity)
taus:        [0.0002]       # base/global travel rate (used for air-only runs)
# Per-layer mobility rates for MULTIMODAL runs. air/water are diffusive
# (relocation); land is recurrent commuting (its rate = commuting fraction).
# Leave null for air-only. Example for [air, land, water]:
#   tau_by_layer: {air: 0.0002, land: 0.3, water: 0.0005}
tau_by_layer: null
# Optional in-transit transmission (refinement axis). null => transmission only
# at cities. When set, travellers undergo the full model dynamics during the
# trip (duration = distance/speed, so ferries dominate). `control` in [0,1] is
# onboard-intervention effectiveness (screening / onboard quarantine / hospital
# ship). Example:
#   transit: {water: {speed_kmh: 40, beta: 0.3, control: 0.0},
#             air:   {speed_kmh: 800, beta: 0.1, control: 0.0}}
transit: null
# Horizon = 210 days, chosen from the operating-point scan, NOT the blueprint's
# model before its peak. 210 captures the peak and most of the decline for all
# four under one uniform horizon (required for cross-model comparability).
# Re-check with:  netsci evaluate operating-point --model seir --horizon 300
horizons:    [210]
seeds:       [0, 1, 2]      # patient-zero randomisation; results averaged over
seed_size:   2500           # initial infectious seed
