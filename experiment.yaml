# ===========================================================================
# experiment.yaml — MASTER CONFIG. The single place to tune everything.
#
# This drives both network generation and the full evaluation sweep:
#   netsci netgen build-all --config experiment.yaml   # build every network
#   netsci evaluate sweep    --config experiment.yaml   # run the whole grid
#   netsci evaluate collect                             # aggregate to a table
#
# Every list below is a sweep axis: the experiment is the Cartesian product of
# regions x layer_sets x models x strategies x (budgets x coverages x
# efficacies) x beta_scales x taus x horizons x seeds.
# ===========================================================================

# --- Geography & substrate: the 8 networks we build & study ------------------
# Explicit `networks` list (overrides regions x layer_sets). The substrate is
# deliberately ASYMMETRIC, see docs/EXPERIMENTS.md:
#   * air-only across every region  -> fair cross-region comparison (uniform
#     OpenFlights data everywhere => differences reflect topology, not data);
#   * air+land+water for EUROPE only -> the multilayer flagship, where ground
#     and ferry flow data is dense enough to be defensible (validated vs
#     Eurostat). Europe also gets the air and air+water rungs so the ladder
#     (air -> +water -> +land) is an apples-to-apples comparison. Water is added
#     BEFORE land: land coupling is so strong it swamps water's marginal effect,
#     so we show water's contribution first, then land's.
networks:
  # -- Europe ladder (same region, more realism each step) --
  - {region: europe,   layers: [air, land, water]}   # 1 (flagship, full)
  - {region: europe,   layers: [air, water]}         # 2  (+water)
  - {region: europe,   layers: [air]}                # 3  (shared pivot)
  # -- Cross-region spectrum (same layer everywhere, fair comparison) --
  - {region: americas, layers: [air]}                # 4
  - {region: asia,     layers: [air]}                # 5
  - {region: africa,   layers: [air]}                # 6
  - {region: oceania,  layers: [air]}                # 7
  - {region: world,    layers: [air]}                # 8

# Legacy cartesian axes (ignored while `networks` above is set; kept as docs).
regions:    [europe]
layer_sets: [[air]]

# --- Protocol: how we walk the grid ------------------------------------------
# `factorial` crosses every axis at once (the full ~864-run grid). `staged` is
# the smaller, sequential coordinate descent down the Europe realism ladder
# (~140 runs), implemented in src/evaluate/staged.py:
#   1 spread     every disease x rung, control only
#   2 vaccinate  the anchor disease x every strategy x rung  (results pick a winner)
#   3 re-check   the winning strategy on the OTHER diseases at the flagship rung
# The cross-region networks above are still BUILT (for the topology-only region
# spectrum) but get no epidemic runs -- the funnel: wide=structure, deep=Europe.
protocol:
  mode: staged
  ladder_region: europe
  rungs: [[air], [air, water], [air, land, water]]   # add water before land
  anchor_disease: sir           # immunizing (measles); winner re-checked on the rest
  flagship: [air, land, water]
  rank_by: peak_infected        # best strategy = lowest peak (lower is better)
  # Stage 4 dose-response: sweep the winning strategy's budget on the flagship to
  # find how many cities are needed for a great reduction. 15 is included so it
  # connects to the strategy comparison; the high end probes diminishing returns.
  budget_grid: [5, 15, 30, 60, 120, 200]

# --- Population proxy (fallback only) -----------------------------------------
# Real GeoNames city populations are used for nodes; this proxy
# pop(v)=p0+degree(v)*p_route only fills any node lacking a real population.
population:
  p0: 150000
  p_route: 45000

# --- Disease types: literature-anchored, not generic --------------------------
# Each entry is a disease TYPE keyed by its model, with parameters taken from a
# real exemplar (see docs/paper-methodology/disease-types.md for every value +
# source). beta is NOT generic: it is derived so the within-city reproduction
# number equals the exemplar's literature R0, beta = R0 * gamma (and R0*(gamma+kappa)
# for the isolation type). The engine + figures handle all five; we currently RUN
# two -- the immunizing and endemic ends of the spectrum.
models:
  # Immunizing, acute (measles): gamma=0.13 (~8 d), R0~15  -> beta = 15 * 0.13
  sir:  {beta: 1.95,  gamma: 0.13}
  # Endemic, no immunity (gonorrhea): gamma~0.03 (long), R0~1.4 -> beta = 1.4 * 0.03
  sis:  {beta: 0.042, gamma: 0.03}
  # --- Other types, ready to enable (engine + figures already support them) ----
  # Latent + immunizing (COVID): R0~2.7 -> beta = 2.7 * 0.13
  # seir:   {beta: 0.35, gamma: 0.13, sigma: 0.20}
  # Recurrent, waning (influenza): R0~1.5 -> beta = 1.5 * 0.21
  # seirs:  {beta: 0.32, gamma: 0.21, sigma: 0.70, omega: 0.001}
  # Lethal, isolation-controlled (Ebola): R0~2.0 -> beta = 2.0 * (gamma+kappa)
  # seiqrd: {beta: 0.60, gamma: 0.10, sigma: 0.09, kappa: 0.20, gamma_q: 0.10, mu: 0.71}

# --- Vaccination strategies --------------------------------------------------
# Blueprint set (control, random, degree, betweenness) + subgraph (novelty).
# kcore available in the registry but excluded to keep the grid focused.
strategies: [control, random, degree, betweenness, subgraph]
budgets:    [15]            # number of cities immunised
coverages:  [0.75]          # single operating coverage (coverage sweep dropped)
efficacies: [0.85]

# --- Sensitivity axes (for ranking-stability / operating-point analysis) -----
beta_scales: [1.0]          # multiplies every model's beta (R0 sensitivity)
taus:        [0.0002]       # base/global travel rate (used for air-only runs)
# --- Mobility coupling: the two we commit to ---------------------------------
# The engine can express several couplings; for this study we deliberately
# commit to TWO, the pair that the methodology builds on:
#   * DIFFUSIVE relocation (air, water): a fraction of every compartment moves
#     to the destination city and mixes there.
#   * RECURRENT commuting (land): residents commute, mix, and return home, so
#     land couples the force of infection rather than relocating people.
# Air-only networks are therefore purely diffusive; the multimodal network adds
# the recurrent land coupling. We set both rates explicitly (rather than leaving
# them implicit) so the choice is on the record:
tau_by_layer: {air: 0.0002, land: 0.3, water: 0.0005}
# Optional in-transit transmission (refinement axis). null => transmission only
# at cities. When set, travellers undergo the full model dynamics during the
# trip (duration = distance/speed, so ferries dominate). `control` in [0,1] is
# onboard-intervention effectiveness (screening / onboard quarantine / hospital
# ship). Example:
#   transit: {water: {speed_kmh: 40, beta: 0.3, control: 0.0},
#             air:   {speed_kmh: 800, beta: 0.1, control: 0.0}}
transit: null
# Horizon = 1460 days (4 years), one uniform horizon for cross-disease
# comparability. The acute type (measles) peaks and burns out in the first
# ~few months, so the long tail is cheap flat S/R state; the endemic type
# (gonorrhea, SIS) is slow (growth rate r = beta - gamma ~= 0.012/day) and needs
# years to approach its endemic equilibrium, which a 210-day horizon never let
# it reach. So peak active infections means the transient peak for acute types
# and the (near-)equilibrium prevalence for endemic ones -- comparable, but read
# with that in mind.
horizons:    [1460]
seeds:       [0]            # single seed (seeded in the giant component, so it takes off)
seed_size:   2500           # initial infectious seed
