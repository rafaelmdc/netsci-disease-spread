# One image, several ways to use it.
#   docker compose build
#   docker compose run --rm app netgen toy           # one-off CLI command
#   docker compose up dashboard worker redis         # the simulator → http://localhost:8000
#   docker compose up notebook                       # Jupyter at http://localhost:8888

x-artifacts: &artifacts
  - ./data:/app/data
  - ./results:/app/results
  - ./figures:/app/figures
  - ./configs:/app/configs
  - ./vendor:/app/vendor

services:
  app:
    build: .
    image: netsci-disease-spread:latest
    working_dir: /app
    # write artifacts as the host user, not root (override: `export UID GID`)
    user: "${UID:-1000}:${GID:-1000}"
    volumes: *artifacts

  # Redis backs the arq job queue + the live progress pub/sub.
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  # The simulator web app (design → run live → explore).
  dashboard:
    build: .
    image: netsci-disease-spread:latest
    working_dir: /app
    user: "${UID:-1000}:${GID:-1000}"
    entrypoint: []
    command: netsci dashboard --host 0.0.0.0 --port 8000
    environment:
      REDIS_URL: redis://redis:6379
    ports:
      - "8000:8000"
    volumes: *artifacts
    depends_on:
      - redis

  # The arq worker that executes queued simulations (one at a time).
  worker:
    build: .
    image: netsci-disease-spread:latest
    working_dir: /app
    user: "${UID:-1000}:${GID:-1000}"
    entrypoint: []
    command: netsci worker
    environment:
      REDIS_URL: redis://redis:6379
    volumes: *artifacts
    depends_on:
      - redis

  notebook:
    image: netsci-disease-spread:latest
    working_dir: /app
    entrypoint: []
    command: >
      uv run --with jupyterlab
      jupyter lab --ip=0.0.0.0 --port=8888 --no-browser --allow-root
      --NotebookApp.token=''
    ports:
      - "8888:8888"
    volumes:
      - ./:/app
