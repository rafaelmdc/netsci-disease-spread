name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "0.5.x"
      - name: Sync (locked)
        run: uv sync --frozen
      - name: Ruff
        run: uv run ruff check src/ tests/
      - name: Pytest
        run: uv run pytest -q

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: docker build -t netsci-disease-spread:ci .
      - name: Smoke test (toy pipeline in container)
        run: |
          docker run --rm netsci-disease-spread:ci netgen --help
