{% extends "base.html" %}
{% block title %}Study{% endblock %}
{% block content %}

<div style="display:flex;align-items:center;justify-content:space-between;gap:1rem;flex-wrap:wrap">
  <div>
    <div class="eyebrow">Full study (Nextflow)</div>
    <h1 style="margin-bottom:.3rem">{{ job.title }}</h1>
    <span id="pipe-status" class="badge {{ job.status }}">{{ job.status }}</span>
  </div>
  <a class="btn-ghost" href="/jobs">All runs</a>
</div>

<div class="panel" style="margin-top:1.2rem">
  <div class="panel-h">Pipeline log</div>
  <div class="panel-b"><pre id="pipe-log" class="logbox"></pre></div>
</div>

<div class="panel" id="pipe-done" style="margin-top:1.2rem" {{ '' if job.status == 'done' else 'hidden' }}>
  <div class="panel-b chips">
    <a class="chip" href="/files/index.html" target="_blank">Open results site</a>
    <a class="chip" href="/compare">Compare</a>
  </div>
</div>

{% endblock %}
{% block scripts %}
<script>
  document.addEventListener("DOMContentLoaded", () => startPipeline("{{ job.id }}"));
</script>
{% endblock %}
